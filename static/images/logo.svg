<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Circle with Gradient -->
  <defs>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="95" fill="url(#circleGradient)" stroke="#a855f7" stroke-width="3"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="85" fill="#5b21b6" opacity="0.8"/>
  
  <!-- Chart Bars -->
  <rect x="45" y="110" width="18" height="35" fill="#c4b5fd" rx="2"/>
  <rect x="70" y="95" width="18" height="50" fill="#a78bfa" rx="2"/>
  <rect x="95" y="80" width="18" height="65" fill="#8b5cf6" rx="2"/>
  <rect x="120" y="65" width="18" height="80" fill="#7c3aed" rx="2"/>
  
  <!-- Rupee Symbol -->
  <g transform="translate(100, 120)">
    <path d="M -8 -10 L 8 -10 M -8 -5 L 8 -5 M -5 -10 L -5 5 Q -5 10 0 10 L 8 10 M 0 0 L 8 10" 
          stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Upward Arrow -->
  <g transform="translate(145, 55)">
    <path d="M 0 25 L 0 0 M 0 0 L -8 8 M 0 0 L 8 8" 
          stroke="url(#arrowGradient)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Growth Line -->
  <path d="M 40 130 Q 70 110, 100 100 T 160 60" 
        stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Decorative Dots -->
  <circle cx="40" cy="130" r="3" fill="#fbbf24"/>
  <circle cx="160" cy="60" r="3" fill="#fbbf24"/>
</svg>
