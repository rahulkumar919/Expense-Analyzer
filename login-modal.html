<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExpenseAnalyzer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #05070a, #161b22, #0d1117, #05070a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f6fc;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-container {
            background: rgba(22, 27, 34, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff 0%, #58a6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #8b949e;
            font-size: 0.9rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #58a6ff;
            border-bottom-color: #58a6ff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.875rem;
            border-radius: 12px;
            color: #f0f6fc;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(110, 142, 251, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: #8b949e;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 1rem;
        }

        .google-btn {
            width: 100%;
            background: white;
            color: #333;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .otp-section {
            display: none;
        }

        .otp-section.active {
            display: block;
        }

        .otp-inputs {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f0f6fc;
            outline: none;
        }

        .otp-input:focus {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
        }

        .resend-link {
            text-align: center;
            margin-top: 1rem;
            color: #58a6ff;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid rgba(248, 81, 73, 0.3);
            color: #f85149;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .success-message {
            background: rgba(63, 185, 80, 0.1);
            border: 1px solid rgba(63, 185, 80, 0.3);
            color: #3fb950;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .hidden {
            display: none !important;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-chart-pie"></i> ExpenseAnalyzer</h1>
            <p>Track • Analyze • Save Smartly</p>
        </div>

        <div id="error-container"></div>
        <div id="success-container"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="form-section">
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" id="login-identifier" placeholder="Enter email or username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            <button class="btn-primary" onclick="handleLogin()">
                <span id="login-btn-text">Login</span>
            </button>

            <div class="divider"><span>OR</span></div>
            
            <button class="google-btn" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i>
                Continue with Google
            </button>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="form-section hidden">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="register-username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="register-email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="register-password" placeholder="Create a password (min 6 characters)">
            </div>
            <button class="btn-primary" onclick="handleRegister()">
                <span id="register-btn-text">Create Account</span>
            </button>

            <div class="divider"><span>OR</span></div>
            
            <button class="google-btn" onclick="handleGoogleLogin()">
                <i class="fab fa-google"></i>
                Sign up with Google
            </button>
        </div>

        <!-- OTP Verification Section -->
        <div id="otp-section" class="otp-section">
            <div class="form-group">
                <label>Enter OTP sent to <span id="otp-email"></span></label>
                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this, 0)">
                    <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this, 1)">
                    <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this, 2)">
                    <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this, 3)">
                    <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this, 4)">
                    <input type="text" class="otp-input" maxlength="1" oninput="moveToNext(this, 5)">
                </div>
            </div>
            <button class="btn-primary" onclick="handleOTPVerification()">
                <span id="otp-btn-text">Verify OTP</span>
            </button>
            <div class="resend-link" onclick="handleResendOTP()">
                Didn't receive OTP? Resend
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';
        let currentEmail = '';

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }
            
            clearMessages();
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function showSuccess(message) {
            const container = document.getElementById('success-container');
            container.innerHTML = `<div class="success-message">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function clearMessages() {
            document.getElementById('error-container').innerHTML = '';
            document.getElementById('success-container').innerHTML = '';
        }

        async function handleRegister() {
            clearMessages();
            const username = document.getElementById('register-username').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;

            if (!username || !email || !password) {
                showError('All fields are required');
                return;
            }

            const btn = document.getElementById('register-btn-text');
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentEmail = email;
                    document.getElementById('otp-email').textContent = email;
                    document.getElementById('register-form').classList.add('hidden');
                    document.getElementById('otp-section').classList.add('active');
                    showSuccess(data.message);
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                btn.textContent = 'Create Account';
            }
        }

        async function handleLogin() {
            clearMessages();
            const identifier = document.getElementById('login-identifier').value.trim();
            const password = document.getElementById('login-password').value;

            if (!identifier || !password) {
                showError('All fields are required');
                return;
            }

            const btn = document.getElementById('login-btn-text');
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentEmail = data.email;
                    document.getElementById('otp-email').textContent = data.email;
                    document.getElementById('login-form').classList.add('hidden');
                    document.getElementById('otp-section').classList.add('active');
                    showSuccess(data.message);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                btn.textContent = 'Login';
            }
        }

        async function handleOTPVerification() {
            clearMessages();
            const otpInputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(otpInputs).map(input => input.value).join('');

            if (otp.length !== 6) {
                showError('Please enter complete OTP');
                return;
            }

            const btn = document.getElementById('otp-btn-text');
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const response = await fetch(`${API_URL}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError(data.error || 'OTP verification failed');
                    otpInputs.forEach(input => input.value = '');
                    otpInputs[0].focus();
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                btn.textContent = 'Verify OTP';
            }
        }

        async function handleResendOTP() {
            clearMessages();
            try {
                const response = await fetch(`${API_URL}/auth/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail })
                });

                const data = await response.json();
                if (response.ok) {
                    showSuccess('OTP resent successfully!');
                } else {
                    showError(data.error || 'Failed to resend OTP');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        function handleGoogleLogin() {
            showError('Google OAuth integration requires Google Client ID configuration. Please check backend setup.');
        }

        function moveToNext(current, index) {
            if (current.value.length === 1 && index < 5) {
                document.querySelectorAll('.otp-input')[index + 1].focus();
            }
        }

        // Auto-focus first OTP input when section becomes active
        const observer = new MutationObserver(() => {
            if (document.getElementById('otp-section').classList.contains('active')) {
                document.querySelector('.otp-input').focus();
            }
        });
        observer.observe(document.getElementById('otp-section'), { attributes: true });
    </script>
</body>
</html>
